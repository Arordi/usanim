        }

        function load() {
            const saved = localStorage.getItem('usanim_data');
            if(saved) {
                const parsed = JSON.parse(saved);
                words.forEach(w => { if(parsed[w.id]!== undefined) w.score = parsed[w.id]; });
            }

        }

        }

            document.getElementById('view').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');

        let matchSelected = null;
        function renderMatch5() {
            const container = document.getElementById('content');
             // Use first 5 words from the current active list
            const subList = activeList.slice(0, 5);
             if(subList.length < 5) {
                container.innerHTML = `<div class='text-center p-10'><h2 class='text-xl font-bold mb-4'>Այս փուլի համար բավարար բառեր չկան։</h2><p class="mb-4">Անհրաժեշտ է առնվազն 5 չսովորած բառ։</p><button onclick='exitToMenu()' class='bg-indigo-600 text-white px-6 py-2 rounded-xl'>Հետ դեպի Մենյու</button></div>`;
                return;
            }
            const enList = [...subList].sort(() => 0.5 - Math.random());
            const hyList = [...subList].sort(() => 0.5 - Math.random());

            container.innerHTML = `
                <div class="grid grid-cols-2 gap-4 w-full">
                    <div class="flex flex-col gap-3" id="en-cols">${enList.map(w => `<div class="match-box" data-type="en" data-id="${w.id}" onclick="handleMatch(this)">${w.en}</div>`).join('')}</div>
                    <div class="flex flex-col gap-3" id="hy-cols">${hyList.map(w => `<div class="match-box" data-type="hy" data-id="${w.id}" onclick="handleMatch(this)">${w.hy}</div>`).join('')}</div>
                </div>
            `;
        }

        function handleMatch(el) {
            if(el.classList.contains('match-correct')) return;
            if(!matchSelected) {
                matchSelected = el;
                el.classList.add('match-selected');
            } else {
                if(matchSelected.dataset.type!== el.dataset.type && matchSelected.dataset.id === el.dataset.id) {
                    el.classList.add('match-correct');
                    matchSelected.classList.remove('match-selected');
                    matchSelected.classList.add('match-correct');
                    matchSelected = null;
                    checkMatchEnd();
                } else {
                    el.classList.add('match-wrong');
                    matchSelected.classList.add('match-wrong');
                    setTimeout(() => {
                        el.classList.remove('match-wrong');
                        matchSelected.classList.remove('match-wrong');
                        matchSelected.classList.remove('match-selected');
                        matchSelected = null;
                    }, 500);
                }
            }
        }

        function checkMatchEnd() {
            const corrects = document.querySelectorAll('.match-correct').length;
            if(corrects === 10) {
                activeList.slice(0, 5).forEach(w => { w.score++; if(w.score > 10) w.score = 10; });
                save();
                setTimeout(() => {
                    // Refresh the 10-word list and restart the stage
                    activeList = words.filter(w => w.score < 10).sort(() => 0.5 - Math.random()).slice(0, 10);
                    renderMatch5();
                }, 800);
            }
        }

                activeIndex++;
                btn.classList.add('bg-green-100', 'border-green-400');
