<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usanim Test</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; width: 100%; max-width: 350px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; margin-top: 50px; }
        .word { font-size: 50px; color: #3f51b5; font-weight: bold; margin-bottom: 5px; }
        .trans { color: #888; font-size: 20px; margin-bottom: 20px; }
        .arm { font-size: 30px; color: #333; margin: 20px 0; display: none; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .known { background: #4caf50; color: white; }
        .unknown { background: #f44336; color: white; }
        .next { background: #3f51b5; color: white; display: none; width: 100%; margin-top: 20px; }
        .score { margin-top: 20px; font-size: 18px; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <div id="en-word" class="word">my</div>
        <div id="tr-word" class="trans">[մայ]</div>
        <div id="am-word" class="arm">իմ</div>
        <div id="actions" class="btn-group">
            <button class="known" onclick="handleChoice(true)">Գիտեմ</button>
            <button class="unknown" onclick="handleChoice(false)">Չգիտեմ</button>
        </div>
        <button id="next-btn" class="next" onclick="loadNext()">ՀԱՋՈՐԴԸ</button>
    </div>
    <div class="score">Սովորած բառեր՝ <span id="count">0</span></div>

    <script>
        const words = [
            { en: "my", tr: "մայ", am: "իմ" },
            { en: "your", tr: "յոր", am: "քո" },
            { en: "his", tr: "հիզ", am: "նրա (արական)" }
        ];
        let index = 0; let score = 0;
        function handleChoice(known) {
            document.getElementById('am-word').style.display = 'block';
            document.getElementById('actions').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            if(known) { score++; document.getElementById('count').innerText = score; }
        }
        function loadNext() {
            index++;
            if(index < words.length) {
                document.getElementById('en-word').innerText = words[index].en;
                document.getElementById('tr-word').innerText = '[' + words[index].tr + ']';
                document.getElementById('am-word').innerText = words[index].am;
                document.getElementById('am-word').style.display = 'none';
                document.getElementById('actions').style.display = 'flex';
                document.getElementById('next-btn').style.display = 'none';
            } else {
                alert("Փուլն ավարտվեց: Արդյունքը՝ " + score);
                index = -1; loadNext();
            }
        }
    </script>
</body>
</html>
