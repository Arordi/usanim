<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usanim - Learn English</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding-bottom: 70px; }
        header { background: #1a73e8; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; position: sticky; top: 0; }
        .content { padding: 15px; }
        .section-title { font-size: 18px; color: #555; margin: 20px 0 10px; border-left: 4px solid #1a73e8; padding-left: 10px; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .word-en { color: #1a73e8; font-weight: bold; font-size: 18px; }
        .word-hy { color: #666; font-size: 16px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; color: #888; text-decoration: none; font-size: 12px; }
        .nav-item.active { color: #1a73e8; }
        .icon { font-size: 20px; display: block; }
    </style>
</head>
<body>

<header>USANIM</header>

<div class="content">
    <div class="section-title">A1 - Հիմնական բառեր</div>
    
    <div class="card">
        <div><span class="word-en">Hello</span> <span class="word-hy">- Բարև</span></div>
        <span>🔊</span>
    </div>

    <div class="card">
        <div><span class="word-en">Water</span> <span class="word-hy">- Ջուր</span></div>
        <span>🔊</span>
    </div>

    <div class="section-title">Կատեգորիաներ</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="card" style="justify-content: center; height: 60px;">🍎 Մրգեր</div>
        <div class="card" style="justify-content: center; height: 60px;">🐶 Կենդանիներ</div>
    </div>
</div>

<div class="nav-bar">
    <a href="#" class="nav-item active"><span class="icon">🏠</span>Գլխավոր</a>
    <a href="#" class="nav-item"><span class="icon">📚</span>Դասեր</a>
    <a href="#" class="nav-item"><span class="icon">⚙️</span>Կարգավորում</a>
</div>

</body>
</html>
