<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usanim - English A1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; user-select: none; touch-action: manipulation; }
        .stage-card { transition: all 0.2s ease; border: 2px solid transparent; cursor: pointer; height: 100%; }
        .stage-card:active { transform: scale(0.95); }
        .match-box { border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; min-height: 60px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
        .match-selected { border-color: #3b82f6; background-color: #eff6ff; }
        .match-correct { border-color: #22c55e; background-color: #f0fdf4; pointer-events: none; opacity: 0.6; }
        .match-wrong { border-color: #ef4444; background-color: #fef2f2; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        .blur-text { filter: blur(10px); transition: all 0.3s ease; cursor: pointer; }
        .blur-text.revealed { filter: blur(0); }

        .global-star { font-size: 18px; line-height: 1; transition: color 0.3s; }
        .local-dot { font-size: 14px; line-height: 1; transition: color 0.3s; }

        .btn-primary { background-color: #4f46e5; color: white; padding: 1.25rem; border-radius: 1rem; font-weight: bold; font-size: 1.25rem; width: 100%; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .btn-next { background-color: #1e293b; color: white; padding: 1.25rem; border-radius: 1rem; font-weight: bold; font-size: 1.25rem; width: 100%; margin-top: 1.5rem; }
    </style>
</head>
<body class="w-full bg-white min-h-screen relative">

    <div class="bg-indigo-600 p-4 text-white sticky top-0 z-50 shadow-md w-full">
        <div class="max-w-4xl mx-auto flex justify-between items-center mb-2">
            <div onclick="exitToMenu()" class="cursor-pointer">
                <h1 class="font-bold text-xl">Usanim A1</h1>
                <p id="progress-text" class="text-xs opacity-80">Սինխրոնացված է ✅</p>
            </div>
            <button onclick="resetData()" class="text-[10px] bg-rose-600 hover:bg-rose-700 px-3 py-1 rounded-md transition font-bold">RESET 🗑️</button>
        </div>
        <div class="max-w-4xl mx-auto w-full bg-indigo-900 rounded-full h-2">
            <div id="progress-bar" class="bg-emerald-400 h-2 rounded-full" style="width: 0%"></div>
        </div>
    </div>

    <div id="menu" class="max-w-4xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
        <button onclick="openStage(1)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🗂️</span><span class="font-bold text-sm">Փուլ 1</span><p class="text-[10px] text-gray-400 uppercase">Flashcards</p>
        </button>
        <button onclick="openStage(2)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🔘</span><span class="font-bold text-sm">Փուլ 2</span><p class="text-[10px] text-gray-400 uppercase">Ընտրություն</p>
        </button>
        <button onclick="openStage(3)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🧩</span><span class="font-bold text-sm">Փուլ 3</span><p class="text-[10px] text-gray-400 uppercase">Match Game</p>
        </button>
        <button onclick="openStage(4)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">⌨️</span><span class="font-bold text-sm">Փուլ 4</span><p class="text-[10px] text-gray-400 uppercase">Ուղղագրություն</p>
        </button>
        <button onclick="openStage(5)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🔄</span><span class="font-bold text-sm">Փուլ 5</span><p class="text-[10px] text-gray-400 uppercase">Թարգմանություն</p>
        </button>
        <button onclick="openStage(6)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🎧</span><span class="font-bold text-sm">Փուլ 6</span><p class="text-[10px] text-gray-400 uppercase">Լսողություն</p>
        </button>
        <button onclick="openStage(7)" class="stage-card p-4 bg-indigo-50 border-indigo-200 rounded-2xl shadow-sm flex flex-col items-center">
            <span class="text-3xl mb-1">🎓</span><span class="font-bold text-indigo-700 text-sm">Քննություն</span>
        </button>
        <button onclick="openStage(8)" class="stage-card p-4 bg-emerald-50 border-emerald-200 rounded-2xl shadow-sm flex flex-col items-center">
            <span class="text-3xl mb-1">📊</span><span class="font-bold text-emerald-700 text-sm">Արդյունքներ</span>
        </button>
    </div>

    <div id="view" class="hidden p-4 min-h-[80vh] max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <button onclick="exitToMenu()" class="text-indigo-600 font-bold flex items-center bg-indigo-50 px-4 py-2 rounded-xl">🏠 Մենյու</button>
            <div id="view-title" class="text-xs font-bold text-gray-400 uppercase tracking-widest"></div>
        </div>
        <div id="content" class="flex flex-col items-center w-full"></div>
    </div>

    <script>
        let words = [];
        let activeStage = 1;
        let activeIndex = 0;
        let activeList = [];
        let matchSelected = null;
        let examScore = 0;
        let examList = [];
        let canProceed = false;

        async function initApp() {
            try {
                const response = await fetch('./vocabulary.json');
                const data = await response.json();
                words = data.map((item, index) => ({
                    id: item.id || index,
                    en: item.word,
                    hy: item.translation,
                    tr: item.transcription || "",
                    score: 0,
                    isInstant: false,
                    stagesCompleted: []
                }));
                loadProgress();
                updateOverallProgress();
            } catch (e) { console.error("Data error:", e); }
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function loadProgress() {
            const saved = localStorage.getItem('usanim_data');
            if(saved) {
                const parsed = JSON.parse(saved);
                words.forEach(w => { 
                    if(parsed[w.id]) {
                        w.score = parsed[w.id].s || 0;
                        w.isInstant = parsed[w.id].i || false;
                        w.stagesCompleted = parsed[w.id].c || [];
                    }
                });
            }
        }

        function saveProgress() {
            const progress = {};
            words.forEach(w => progress[w.id] = { s: w.score, i: w.isInstant, c: w.stagesCompleted });
            localStorage.setItem('usanim_data', JSON.stringify(progress));
            updateOverallProgress();
        }

        function updateOverallProgress() {
            const learned = words.filter(w => w.stagesCompleted.length >= 5 || w.isInstant).length;
            const percent = words.length > 0 ? (learned / words.length) * 100 : 0;
            document.getElementById('progress-text').innerText = `Յուրացված: ${learned} / ${words.length}`;
            document.getElementById('progress-bar').style.width = percent + "%";
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function getStars(word) {
            let html = '<div class="flex flex-col items-center gap-1 mb-4">';
            // Գլոբալ աստղեր ★ (Փուլերի համար)
            html += '<div class="flex gap-1">';
            for (let i = 2; i <= 6; i++) {
                const color = word.stagesCompleted.includes(i) ? 'text-orange-500' : 'text-gray-200';
                html += `<span class="global-star ${color}">★</span>`;
            }
            html += '</div>';
            // Կանաչ աստղեր ● (Ընթացիկ փուլի score/2)
            html += '<div class="flex gap-1">';
            for (let i = 1; i <= 5; i++) {
                const color = word.score >= (i * 2) ? 'text-emerald-500' : 'text-gray-200';
                html += `<span class="local-dot ${color}">●</span>`;
            }
            html += '</div></div>';
            return html;
        }

        function openStage(num) {
            activeStage = num;
            activeIndex = 0;
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = num === 8 ? "ԱՐԴՅՈՒՆՔՆԵՐ" : `ՓՈՒԼ ${num}`;
            initStageLogic();
        }

        function exitToMenu() {
            document.getElementById('view').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            window.speechSynthesis.cancel();
        }

        function initStageLogic() {
            const container = document.getElementById('content');
            container.innerHTML = "";
            canProceed = false;

            if (activeStage === 1) {
                activeList = words.filter(w => !w.isInstant);
                if (activeList.length === 0) { renderFinishedAll(); return; }
                renderStage1();
            } else if (activeStage >= 2 && activeStage <= 6) {
                activeList = words.filter(w => !w.stagesCompleted.includes(activeStage) && !w.isInstant);
                if (activeList.length === 0) { renderFinishedAll(); return; }
                if (activeStage === 3) renderMatch5();
                else renderLearningStages();
            } else if (activeStage === 7) {
                examScore = 0;
                examList = shuffle([...words]).slice(0, 50);
                renderExam();
            } else if (activeStage === 8) renderStage8();
        }

        function renderFinishedAll() {
            document.getElementById('content').innerHTML = `
                <div class="text-center p-10 bg-emerald-50 rounded-3xl border-2 border-emerald-100 w-full max-lg">
                    <span class="text-6xl mb-4 block">🎉</span>
                    <h2 class="text-2xl font-black text-emerald-800">Փուլն ավարտված է:</h2>
                    <button onclick="exitToMenu()" class="btn-primary bg-emerald-600 mt-6">ՎԵՐԱԴԱՌՆԱԼ</button>
                </div>`;
        }

        function renderStage1() {
            const word = activeList[activeIndex];
            document.getElementById('content').innerHTML = `
                <div class="w-full max-w-2xl bg-white border-2 border-indigo-100 rounded-3xl p-10 text-center shadow-lg mb-6">
                    <div onclick="speak('${word.en}')" class="cursor-pointer mb-4">
                        <h2 class="text-6xl font-black text-indigo-600">${word.en}</h2>
                    </div>
                    <hr class="my-6">
                    <h3 onclick="this.classList.toggle('revealed')" class="text-4xl font-bold text-slate-800 blur-text">${word.hy}</h3>
                </div>
                <div class="grid grid-cols-2 gap-4 w-full max-w-2xl">
                    <button onclick="flashcardAction(true)" class="bg-emerald-500 text-white font-bold py-6 rounded-2xl text-xl shadow-lg">ԳԻՏԵՄ</button>
                    <button onclick="flashcardAction(false)" class="bg-rose-500 text-white font-bold py-6 rounded-2xl text-xl shadow-lg">ՉԳԻՏԵՄ</button>
                </div>`;
            speak(word.en);
        }

        function flashcardAction(known) {
            if(known) { 
                const word = activeList[activeIndex];
                word.isInstant = true; 
                word.stagesCompleted = [2,3,4,5,6];
            }
            saveProgress(); 
            activeIndex++;
            initStageLogic();
        }

        function renderLearningStages() {
            const studyBatch = activeList.slice(0, 10);
            const word = studyBatch[activeIndex % studyBatch.length];
            const container = document.getElementById('content');
            container.innerHTML = `<div id="task-area" class="w-full flex flex-col items-center max-w-2xl"></div>`;
            const area = document.getElementById('task-area');

            if(activeStage === 2) {
                let options = shuffle([word.hy, ...shuffle(words.filter(w => w.id !== word.id)).slice(0, 3).map(w => w.hy)]);
                area.innerHTML = `
                    ${getStars(word)}
                    <div class="text-center mb-8" onclick="speak('${word.en}')">
                        <p class="text-6xl font-black text-indigo-600">${word.en}</p>
                    </div>
                    <div id="options-grid" class="grid grid-cols-1 gap-4 w-full">
                        ${options.map(o => `<button onclick="checkChoice(this, '${o}', '${word.hy}')" class="bg-white border-4 p-5 rounded-2xl font-bold text-xl shadow-sm">${o}</button>`).join('')}
                    </div>
                    <button id="next-btn" onclick="nextWord()" class="hidden btn-next">ՀԱՋՈՐԴԸ ➔</button>`;
                speak(word.en);
            } else {
                const isListen = activeStage === 6, isTrans = activeStage === 5;
                const correctVal = isTrans ? word.hy : word.en;
                area.innerHTML = `
                    ${getStars(word)}
                    <div class="text-center mb-6">
                        ${isListen ? `<button onclick="speak('${word.en}')" class="text-8xl p-8 bg-indigo-50 rounded-full">🔊</button>` : `<p class="text-5xl font-bold text-slate-700">${isTrans ? word.en : word.hy}</p>`}
                    </div>
                    <input type="text" id="userInput" class="w-full p-6 border-4 rounded-2xl text-center text-3xl mb-4 outline-none border-gray-200" placeholder="..." autocomplete="off">
                    <div id="feedback" class="hidden text-xl font-bold mb-4"></div>
                    <button id="check-btn" onclick="checkWriting('${correctVal}')" class="btn-primary">ՍՏՈՒԳԵԼ</button>
                    <button id="next-btn" onclick="nextWord()" class="hidden btn-next">ՀԱՋՈՐԴԸ ➔</button>`;
                if(!isListen) speak(word.en);
                setTimeout(() => document.getElementById('userInput').focus(), 200);
            }
        }

        // ENTER ՍՏԵՂՆ
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const checkBtn = document.getElementById('check-btn');
                const nextBtn = document.getElementById('next-btn');
                if (checkBtn && !checkBtn.classList.contains('hidden')) checkBtn.click();
                else if (nextBtn && !nextBtn.classList.contains('hidden')) nextBtn.click();
            }
        });

        function checkChoice(btn, chosen, correct) {
            if(canProceed) return;
            const studyBatch = activeList.slice(0, 10);
            const word = studyBatch[activeIndex % studyBatch.length];
            if(chosen === correct) { 
                btn.classList.add('bg-emerald-500', 'text-white'); 
                word.score += 1; // +1 Միավոր (Կես աստղ)
            } else { 
                btn.classList.add('bg-rose-500', 'text-white'); 
                word.score = Math.max(0, word.score - 1); // -1 Միավոր (Պակասում է կես աստղ)
                document.querySelectorAll('#options-grid button').forEach(b => { if(b.innerText === correct) b.classList.add('border-emerald-500'); });
            }
            canProceed = true; document.getElementById('next-btn').classList.remove('hidden');
        }

        function checkWriting(correct) {
            if(canProceed) return;
            const input = document.getElementById('userInput'), feedback = document.getElementById('feedback');
            const studyBatch = activeList.slice(0, 10);
            const word = studyBatch[activeIndex % studyBatch.length];
            if(input.value.trim().toLowerCase() === correct.toLowerCase()) { 
                input.classList.add('bg-emerald-500', 'text-white'); 
                word.score += 1;
            } else { 
                input.classList.add('bg-rose-500', 'text-white'); 
                word.score = Math.max(0, word.score - 1);
                feedback.innerHTML = `<span class="text-rose-600">Ճիշտը՝</span> <span class="text-emerald-600 underline">${correct}</span>`; 
                feedback.classList.remove('hidden'); 
            }
            canProceed = true; document.getElementById('check-btn').classList.add('hidden'); document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextWord() {
            const studyBatch = activeList.slice(0, 10);
            const word = studyBatch[activeIndex % studyBatch.length];

            if (word.score >= 10) {
                word.score = 0;
                if(!word.stagesCompleted.includes(activeStage)) word.stagesCompleted.push(activeStage);
                activeList = activeList.filter(w => w.id !== word.id);
            } else {
                activeIndex++;
            }
            saveProgress();
            initStageLogic();
        }

        function renderMatch5() {
            const batch = activeList.slice(0, 5);
            const enL = shuffle([...batch]), hyL = shuffle([...batch]);
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 gap-4 w-full max-w-2xl mt-4">
                    <div class="flex flex-col gap-3">${enL.map(w => `<div class="match-box bg-white shadow-sm" data-type="en" data-id="${w.id}" onclick="handleM(this)">${w.en}</div>`).join('')}</div>
                    <div class="flex flex-col gap-3">${hyL.map(w => `<div class="match-box bg-white shadow-sm" data-type="hy" data-id="${w.id}" onclick="handleM(this)">${w.hy}</div>`).join('')}</div>
                </div>
                <button id="next-btn" onclick="nextWord()" class="hidden btn-next">ՀԱՋՈՐԴԸ ➔</button>`;
        }

        function handleM(el) {
            if(el.classList.contains('match-correct') || el === matchSelected || canProceed) return;
            if(!matchSelected) { matchSelected = el; el.classList.add('match-selected'); }
            else {
                if(matchSelected.dataset.id === el.dataset.id && matchSelected.dataset.type !== el.dataset.type) {
                    el.classList.add('match-correct'); matchSelected.classList.add('match-correct');
                    matchSelected = null;
                    if(document.querySelectorAll('.match-correct').length === (activeList.slice(0, 5).length * 2)) { 
                        activeList.slice(0, 5).forEach(w => w.score = 10); 
                        canProceed = true; document.getElementById('next-btn').classList.remove('hidden'); 
                    }
                } else {
                    el.classList.add('match-wrong'); matchSelected.classList.add('match-wrong');
                    const prev = matchSelected; setTimeout(() => { el.classList.remove('match-wrong', 'match-selected'); prev.classList.remove('match-wrong', 'match-selected'); }, 500);
                    matchSelected = null;
                }
            }
        }

        function renderExam() {
            if(activeIndex >= examList.length) {
                document.getElementById('content').innerHTML = `<div class='text-center p-10 bg-indigo-50 rounded-3xl'><h2 class='text-3xl font-black mb-4'>ԱՐԴՅՈՒՆՔ</h2><p class='text-8xl font-black text-indigo-600 mb-6'>${examScore}/${examList.length}</p><button onclick='exitToMenu()' class='btn-primary'>ՎԵՐԱԴԱՌՆԱԼ</button></div>`;
                return;
            }
            const word = examList[activeIndex];
            const opts = shuffle([word.hy, ...shuffle(words.filter(w => w.id !== word.id)).slice(0, 3).map(w => w.hy)]);
            document.getElementById('content').innerHTML = `<div class="mb-4 font-bold text-gray-400">ՀԱՐՑ ${activeIndex+1}/${examList.length}</div>
            <div class="text-center mb-8"><p class="text-6xl font-black text-indigo-600">${word.en}</p></div>
            <div class="grid grid-cols-1 gap-4 w-full max-w-2xl">${opts.map(o => `<button onclick="handleExamAns(this, '${o}', '${word.hy}')" class="bg-white border-2 p-5 rounded-2xl font-bold text-xl shadow-sm">${o}</button>`).join('')}</div>`;
        }

        function handleExamAns(btn, chosen, correct) {
            if(chosen === correct) { examScore++; btn.classList.add('bg-emerald-500', 'text-white'); } else btn.classList.add('bg-rose-500', 'text-white');
            setTimeout(() => { activeIndex++; renderExam(); }, 400);
        }

        function renderStage8() {
            document.getElementById('content').innerHTML = `<div class="w-full space-y-2 pb-10 max-w-4xl">` + words.map((w, i) => `
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl border ${w.isInstant ? 'border-orange-200 bg-orange-50' : 'border-gray-100'}">
                    <div onclick="speak('${w.en}')" class="cursor-pointer">
                        <p class="font-bold text-indigo-700 text-lg">${i+1}. ${w.en}</p>
                        <p class="text-sm text-gray-500">${w.hy}</p>
                    </div>
                    ${getStars(w)}
                </div>`).join('') + `</div>`;
        }

        function resetData() {
            if (confirm("Ջնջե՞լ ամբողջ առաջընթացը:")) {
                const userInput = prompt("Գրեք 'DELETE'․");
                if (userInput === "DELETE") { localStorage.clear(); location.reload(); }
            }
        }

        initApp();
    </script>
</body>
</html>
