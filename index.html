<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usanim Pro - Լեզուների ուսուցում</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col">

    <div id="welcome-screen" class="flex-grow flex flex-col p-6 max-w-lg mx-auto w-full">
        <div class="mt-16 mb-8 text-center">
            <h1 class="text-5xl font-black text-emerald-400 tracking-tight mb-2 italic">Usanim</h1>
            <p class="text-emerald-500 font-bold tracking-[0.3em] uppercase text-xs">Premium Learning</p>
        </div>
        <div class="space-y-4">
            <div onclick="goToAppMenu()" class="home-card glass p-6 rounded-[2rem] shadow-xl flex items-center justify-between relative overflow-hidden">
                <div class="flex items-center gap-4 z-10">
                    <div class="w-14 h-14 bg-emerald-900/50 rounded-xl flex items-center justify-center text-2xl border border-emerald-700">🇬🇧</div>
                    <div>
                        <h2 class="text-xl font-black text-white leading-tight">A1 Մակարդակ</h2>
                        <div class="flex items-center gap-2 mt-1">
                            <p id="home-word-count" class="text-emerald-300 text-[10px] font-bold uppercase">...</p>
                            <span class="text-emerald-700">|</span>
                            <p id="home-progress-pct" class="text-emerald-400 text-[10px] font-black">0%</p>
                        </div>
                    </div>
                </div>
                <div class="z-10 w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-md">➔</div>
                <div id="home-bg-progress" class="absolute left-0 bottom-0 h-1 bg-emerald-400 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden h-screen flex flex-col overflow-hidden">
        <div class="bg-emerald-900 p-3 text-white sticky top-0 z-50 shadow-lg w-full border-b border-emerald-800 shrink-0">
            <div class="max-w-4xl mx-auto flex justify-between items-center mb-2">
                <div onclick="goToWelcome()" class="cursor-pointer flex items-center gap-2">
                    <span class="text-lg">🏠</span>
                    <h1 class="font-bold text-base leading-none italic uppercase tracking-tighter">Usanim A1</h1>
                </div>
                <div class="flex items-center gap-2">
                    <div id="session-timer-display" class="text-[9px] font-bold bg-black/20 px-2 py-1 rounded-lg border border-emerald-700">00:00</div>
                    <button onclick="showDeleteModal()" class="text-[9px] bg-white/10 hover:bg-white/20 text-white px-3 py-1 rounded-full font-black uppercase tracking-widest transition-colors">Reset</button>
                </div>
            </div>
            <div class="max-w-4xl mx-auto w-full bg-black/30 rounded-full h-1 overflow-hidden">
                <div id="progress-bar" class="bg-emerald-400 h-full rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div id="menu" class="max-w-4xl mx-auto flex-grow">
            <button onclick="openStage(1)" class="stage-card"><span>🗂️</span><span>Փուլ 1</span><span class="sub-label">ստուգում</span></button>
            <button onclick="openStage(2)" class="stage-card"><span>🔘</span><span>Փուլ 2</span><span class="sub-label">տարբերակ</span></button>
            <button onclick="openStage(3)" class="stage-card"><span>🧩</span><span>Փուլ 3</span><span class="sub-label">դասավորել</span></button>
            <button onclick="openStage(4)" class="stage-card"><span>⌨️</span><span>Փուլ 4</span><span class="sub-label">գտնել</span></button>
            <button onclick="openStage(5)" class="stage-card"><span>🔄</span><span>Փուլ 5</span><span class="sub-label">գտնել</span></button>
            <button onclick="openStage(6)" class="stage-card"><span>🎧</span><span>Փուլ 6</span><span class="sub-label">գտնել</span></button>
            <button onclick="openSmartMenu()" class="stage-card"><span>🎓</span><span>Փուլ 7</span><span class="sub-label">կրկնություն</span></button>
            <button onclick="openExam()" class="stage-card"><span>📝</span><span>Փուլ 8</span><span class="sub-label">քննություն</span></button>
            <button onclick="openStatsStage()" class="stage-card"><span>📊</span><span>Փուլ 9</span><span class="sub-label">վիճակագրություն</span></button>
        </div>
    </div>

    <div id="view" class="hidden flex-grow flex flex-col p-4 max-w-2xl mx-auto w-full">
        <div class="flex justify-between items-center mb-4 pt-2">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-[10px] uppercase tracking-widest bg-emerald-900/50 px-3 py-1.5 rounded-full border border-emerald-700 whitespace-nowrap">⬅ ԵԼՔ</button>
            <div id="view-title" class="text-[9px] font-black text-emerald-300 uppercase tracking-[0.2em] text-center px-2"></div>
            <div class="w-10"></div>
        </div>
        <div id="content" class="flex-grow flex flex-col items-center justify-center w-full"></div>
    </div>

    <div id="smart-menu-view" class="hidden flex-grow p-6 max-w-2xl mx-auto space-y-6 text-center w-full">
         <div class="flex justify-start mb-4">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-[10px] uppercase tracking-widest bg-emerald-900/50 px-3 py-1.5 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
        </div>
        <h2 class="text-xl font-black text-emerald-300 italic uppercase">Փուլ 7: Ընտրացանկ</h2>
        <div class="grid grid-cols-1 gap-4 pt-2">
            <button onclick="openSmartStage('difficult')" class="btn-primary flex items-center justify-between p-6">
                <span>🔥 Դժվար բառեր</span>
                <span id="diff-count" class="bg-white/20 px-3 py-1 rounded-full text-xs">0</span>
            </button>
            <button onclick="openSmartStage('repetition')" class="btn-primary flex items-center justify-between p-6 !bg-emerald-900 border border-emerald-700">
                <span>⏳ Կրկնություն</span>
                <span id="rep-count" class="bg-white/20 px-3 py-1 rounded-full text-xs">0</span>
            </button>
        </div>
    </div>

    <div id="stats-view" class="hidden">
        <div class="p-3 bg-emerald-900/80 sticky top-0 z-10 flex justify-between items-center border-b border-emerald-700 backdrop-blur-md">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-[9px] uppercase tracking-widest bg-emerald-900 px-3 py-1.5 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
            <h1 class="font-black text-xs italic uppercase tracking-widest text-white">Վիճակագրություն</h1>
            <div class="w-10"></div>
        </div>
        <div id="stats-container" class="flex-grow overflow-y-auto p-3 space-y-4 custom-scroll"></div>
    </div>

    <div id="delete-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-emerald-900 p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl border border-emerald-700">
            <h2 class="text-lg font-black text-white mb-4 uppercase">Ջնջել ամբողջը</h2>
            <p class="text-emerald-300 text-xs mb-6">Գրիր <b class="text-white">DELETE</b> հաստատելու համար</p>
            <input type="text" id="delete-confirm-input" class="w-full p-4 border-2 border-emerald-700 rounded-2xl text-center mb-6 uppercase outline-none focus:border-emerald-400 transition-all">
            <div class="flex gap-3">
                <button onclick="hideDeleteModal()" class="flex-1 p-4 bg-emerald-800 text-emerald-100 rounded-2xl font-bold">ՈՉ</button>
                <button id="real-delete-btn" onclick="confirmFinalDelete()" disabled class="flex-1 p-4 bg-emerald-700 text-emerald-500 rounded-2xl font-bold transition-all">ԱՅՈ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
