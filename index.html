<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usanim Pro - Լեզուների ուսուցում</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #064e3b; user-select: none; touch-action: manipulation; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .home-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border-left: 10px solid #059669; background: #065f46; }
        .home-card:active { transform: scale(0.96); }
        
        .stage-card { 
            transition: all 0.2s ease; 
            cursor: pointer; 
            background-color: #065f46; 
            border: 2px solid #059669; 
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            color: white;
        }
        .stage-card:active { transform: scale(0.95); background-color: #059669; }
        .stage-card span:last-child { color: #a7f3d0; font-weight: 800; font-size: 11px; text-transform: uppercase; margin-top: 4px; }
        
        .btn-primary { background: linear-gradient(135deg, #059669 0%, #064e3b 100%); color: white; padding: 1.25rem; border-radius: 1.25rem; font-weight: bold; width: 100%; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border: none; }
        .blur-text { filter: blur(8px); transition: all 0.3s ease; cursor: pointer; }
        .blur-text.revealed { filter: blur(0); }
        
        .star-box { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; }
        .star-icon { font-size: 36px; transition: all 0.3s ease; }
        .star-text { 
            position: absolute; 
            top: 55%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 11px; 
            font-weight: 900; 
            color: #064e3b; 
            pointer-events: none;
        }

        .match-item { border: 2px solid #065f46; border-radius: 20px; padding: 12px; text-align: center; cursor: pointer; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 600; background: #064e3b; transition: 0.2s; color: white; }
        .match-selected { border-color: #10b981; background-color: #065f46; }
        .match-correct { border-color: #22c55e; background-color: #14532d; color: #4ade80; }
        .match-wrong { border-color: #ef4444; background-color: #450a0a; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .hidden { display: none !important; }
        
        .choice-btn { transition: all 0.2s; border: 2px solid #065f46; background: #065f46; color: white; }
        .choice-btn:active { transform: scale(0.98); background: #059669; }

        input { background: #064e3b !important; color: white !important; border-color: #059669 !important; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #059669; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="welcome-screen" class="min-h-screen flex flex-col p-6 max-w-lg mx-auto">
        <div class="mt-20 mb-12 text-center">
            <h1 class="text-5xl font-black text-emerald-400 tracking-tight mb-2 italic">Usanim</h1>
            <p class="text-emerald-500 font-bold tracking-[0.3em] uppercase text-xs">Premium Learning</p>
        </div>
        <div class="space-y-4">
            <div onclick="goToAppMenu()" class="home-card glass p-8 rounded-[2.5rem] shadow-xl flex items-center justify-between relative overflow-hidden">
                <div class="flex items-center gap-5 z-10">
                    <div class="w-16 h-16 bg-emerald-900/50 rounded-2xl flex items-center justify-center text-3xl border border-emerald-700">🇬🇧</div>
                    <div>
                        <h2 class="text-2xl font-black text-white leading-tight">A1 Մակարդակ</h2>
                        <div class="flex items-center gap-2 mt-1">
                            <p id="home-word-count" class="text-emerald-300 text-xs font-bold uppercase">...</p>
                            <span class="text-emerald-700">|</span>
                            <p id="home-progress-pct" class="text-emerald-400 text-xs font-black">0%</p>
                        </div>
                    </div>
                </div>
                <div class="z-10 w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-md">➔</div>
                <div id="home-bg-progress" class="absolute left-0 bottom-0 h-1 bg-emerald-400 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <div class="bg-emerald-900 p-4 text-white sticky top-0 z-50 shadow-lg w-full border-b border-emerald-800">
            <div class="max-w-4xl mx-auto flex justify-between items-center mb-2">
                <div onclick="goToWelcome()" class="cursor-pointer flex items-center gap-2">
                    <span class="text-xl">🏠</span>
                    <h1 class="font-bold text-lg leading-none italic uppercase tracking-tighter">Usanim A1</h1>
                </div>
                <button onclick="showDeleteModal()" class="text-[10px] bg-white/10 hover:bg-white/20 text-white px-4 py-1.5 rounded-full font-black uppercase tracking-widest transition-colors">Reset</button>
            </div>
            <div class="max-w-4xl mx-auto w-full bg-black/30 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="bg-emerald-400 h-full rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div id="menu" class="max-w-4xl mx-auto p-4 grid grid-cols-2 md:grid-cols-3 gap-4 py-8">
            <button onclick="openStage(1)" class="stage-card"><span class="text-3xl">🗂️</span><span>Փուլ 1</span></button>
            <button onclick="openStage(2)" class="stage-card"><span class="text-3xl">🔘</span><span>Փուլ 2</span></button>
            <button onclick="openStage(3)" class="stage-card"><span class="text-3xl">🧩</span><span>Փուլ 3</span></button>
            <button onclick="openStage(4)" class="stage-card"><span class="text-3xl">⌨️</span><span>Փուլ 4</span></button>
            <button onclick="openStage(5)" class="stage-card"><span class="text-3xl">🔄</span><span>Փուլ 5</span></button>
            <button onclick="openStage(6)" class="stage-card"><span class="text-3xl">🎧</span><span>Փուլ 6</span></button>
            <button onclick="openSmartMenu()" class="stage-card"><span class="text-3xl">🎓</span><span>Փուլ 7</span></button>
            <button onclick="openExam()" class="stage-card"><span class="text-3xl">📝</span><span>Փուլ 8</span></button>
            <button onclick="openStatsStage()" class="stage-card"><span class="text-3xl">📊</span><span>Փուլ 9</span></button>
        </div>
    </div>

    <div id="view" class="hidden p-4 min-h-screen max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8 pt-4">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-xs uppercase tracking-widest bg-emerald-900/50 px-4 py-2 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
            <div id="view-title" class="text-[10px] font-black text-emerald-300 uppercase tracking-[0.4em]"></div>
            <div class="w-12"></div>
        </div>
        <div id="content" class="flex flex-col items-center w-full"></div>
    </div>

    <div id="smart-menu-view" class="hidden p-6 max-w-2xl mx-auto space-y-6 text-center">
         <div class="flex justify-start mb-8">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-xs uppercase tracking-widest bg-emerald-900/50 px-4 py-2 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
        </div>
        <h2 class="text-2xl font-black text-emerald-300 italic uppercase">Փուլ 7: Ընտրացանկ</h2>
        <div class="grid grid-cols-1 gap-4 pt-4">
            <button onclick="openSmartStage('difficult')" class="btn-primary flex items-center justify-between p-8">
                <span>🔥 Դժվար բառեր</span>
                <span id="diff-count" class="bg-white/20 px-3 py-1 rounded-full text-sm">0</span>
            </button>
            <button onclick="openSmartStage('repetition')" class="btn-primary flex items-center justify-between p-8 !bg-emerald-900 border border-emerald-700">
                <span>⏳ Կրկնություն</span>
                <span id="rep-count" class="bg-white/20 px-3 py-1 rounded-full text-sm">0</span>
            </button>
        </div>
    </div>

    <div id="stats-view" class="hidden p-4 min-h-screen max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8 pt-4">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-xs uppercase tracking-widest bg-emerald-900/50 px-4 py-2 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
            <h1 class="font-bold text-lg italic uppercase tracking-tighter">Վիճակագրություն</h1>
            <div class="w-12"></div>
        </div>
        <div id="stats-container" class="space-y-6"></div>
    </div>

    <div id="delete-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-emerald-900 p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl border border-emerald-700">
            <h2 class="text-xl font-black text-white mb-4 uppercase">Ջնջել ամբողջը</h2>
            <p class="text-emerald-300 text-sm mb-6">Գրիր <b class="text-white">DELETE</b> հաստատելու համար</p>
            <input type="text" id="delete-confirm-input" class="w-full p-4 border-2 border-emerald-700 rounded-2xl text-center mb-6 uppercase outline-none focus:border-emerald-400 transition-all">
            <div class="flex gap-3">
                <button onclick="hideDeleteModal()" class="flex-1 p-4 bg-emerald-800 text-emerald-100 rounded-2xl font-bold">ՈՉ</button>
                <button id="real-delete-btn" onclick="confirmFinalDelete()" disabled class="flex-1 p-4 bg-emerald-700 text-emerald-500 rounded-2xl font-bold transition-all">ԱՅՈ</button>
            </div>
        </div>
    </div>

    <script>
        let words = [], activeStage = 1, activeIndex = 0, activeList = [], canProceed = false;
        let examScores = [], dailyWordsCount = 0, dailyGoal = 20;
        let selectedEn = null, selectedHy = null;
        let smartMode = null; 

        // 1. Initial Data Loading
        async function initApp() {
            try {
                const response = await fetch('./vocabulary.json');
                const data = await response.json();
                
                // Map base words from JSON
                words = data.map((item, index) => ({
                    id: item.id || index, 
                    en: item.word, 
                    hy: item.translation,
                    score: 0, 
                    stagesCompleted: [], 
                    isInstant: false, 
                    isSeen: false,
                    errorCount: 0, 
                    learnedDate: null, 
                    repLevel: 0, 
                    nextRepDate: null
                }));

                // 2. Load and Apply Stored Progress
                loadProgress(); 
                
                // 3. UI Update
                updateStats();
                document.getElementById('home-word-count').innerText = `${words.length} բառ`;
                
                document.getElementById('delete-confirm-input').addEventListener('input', function(e) {
                    const btn = document.getElementById('real-delete-btn');
                    const isMatch = e.target.value.toUpperCase() === 'DELETE';
                    btn.disabled = !isMatch;
                    btn.className = isMatch ? 'flex-1 p-4 bg-rose-600 text-white rounded-2xl font-bold' : 'flex-1 p-4 bg-emerald-800 text-emerald-500 rounded-2xl font-bold';
                });
            } catch (e) { console.error("Error loading app:", e); }
        }

        // --- PERSISTENCE LOGIC ---
        function loadProgress() {
            const saved = localStorage.getItem('usanim_v3_data');
            if(saved) {
                const p = JSON.parse(saved);
                // Merge saved data into current words list by ID
                words.forEach(w => {
                    if(p.words && p.words[w.id]) {
                        Object.assign(w, p.words[w.id]);
                    }
                });
                examScores = p.examScores || [];
                dailyWordsCount = p.dailyWordsCount || 0;
                dailyGoal = p.dailyGoal || 20;
            }
        }

        function saveProgress() {
            const storage = { 
                words: {}, 
                examScores: examScores, 
                dailyWordsCount: dailyWordsCount, 
                dailyGoal: dailyGoal 
            };
            
            // Collect only necessary dynamic data to keep storage clean
            words.forEach(w => {
                storage.words[w.id] = { 
                    score: w.score, 
                    stagesCompleted: w.stagesCompleted, 
                    isInstant: w.isInstant, 
                    isSeen: w.isSeen, 
                    errorCount: w.errorCount, 
                    learnedDate: w.learnedDate,
                    repLevel: w.repLevel, 
                    nextRepDate: w.nextRepDate
                };
            });
            
            localStorage.setItem('usanim_v3_data', JSON.stringify(storage));
        }
        // -------------------------

        function isWordLearned(w) {
            if (w.isInstant) return true;
            const required = [2, 3, 4, 5, 6];
            return required.every(s => w.stagesCompleted.includes(s));
        }

        function setNextRep(word) {
            const intervals = [7, 30, 90];
            const days = intervals[word.repLevel] || 90;
            let date = new Date();
            date.setDate(date.getDate() + days);
            word.nextRepDate = date.toISOString().split('T')[0];
            word.repLevel++;
        }

        function updateStats() {
            const learned = words.filter(w => isWordLearned(w)).length;
            const pct = Math.round((learned / words.length) * 100);
            document.getElementById('home-progress-pct').innerText = pct + "%";
            document.getElementById('home-bg-progress').style.width = pct + "%";
            document.getElementById('progress-bar').style.width = pct + "%";
            
            const diffWords = words.filter(w => w.errorCount >= 5 && !isWordLearned(w));
            const today = new Date().toISOString().split('T')[0];
            const repWords = words.filter(w => isWordLearned(w) && w.nextRepDate && w.nextRepDate <= today);
            
            if(document.getElementById('diff-count')) document.getElementById('diff-count').innerText = diffWords.length;
            if(document.getElementById('rep-count')) document.getElementById('rep-count').innerText = repWords.length;
        }

        function getStars(word) {
            const stages = [2, 3, 4, 5, 6];
            let html = '<div class="flex justify-center gap-1 mb-6">';
            stages.forEach(s => {
                const isCompleted = word.stagesCompleted.includes(s);
                const isActive = (activeStage === s);
                let colorClass = isCompleted ? 'text-yellow-400' : 'text-emerald-800';
                if (isActive && !isCompleted) colorClass = 'text-emerald-500';
                html += `
                    <div class="star-box">
                        <span class="star-icon ${colorClass}">★</span>
                        ${isActive && !isCompleted ? `<span class="star-text !text-white">${word.score}</span>` : ''}
                        ${isCompleted ? `<span class="star-text">✓</span>` : ''}
                    </div>`;
            });
            html += '</div>';
            return html;
        }

        function cleanText(text) {
            return text.trim().toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        }

        function goToAppMenu() { document.getElementById('welcome-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); updateStats(); }
        function goToWelcome() { document.getElementById('app-content').classList.add('hidden'); document.getElementById('welcome-screen').classList.remove('hidden'); updateStats(); }

        function openSmartMenu() {
            updateStats();
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('smart-menu-view').classList.remove('hidden');
        }

        function openSmartStage(mode) {
            smartMode = mode;
            activeStage = 7;
            activeIndex = 0;
            document.getElementById('smart-menu-view').classList.add('hidden');
            document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = mode === 'difficult' ? 'ԴԺՎԱՐ ԲԱՌԵՐ' : 'ԿՐԿՆՈՒԹՅՈՒՆ';
            initStageLogic();
        }

        function openStage(num) {
            activeStage = num; activeIndex = 0; smartMode = null;
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = `Փուլ ${num}`;
            initStageLogic();
        }

        function initStageLogic() {
            const container = document.getElementById('content');
            container.innerHTML = "";
            
            if (activeStage === 7) {
                if(smartMode === 'difficult') {
                    activeList = words.filter(w => w.errorCount >= 5 && !isWordLearned(w)).slice(0, 10);
                } else {
                    const today = new Date().toISOString().split('T')[0];
                    activeList = words.filter(w => isWordLearned(w) && w.nextRepDate && w.nextRepDate <= today).slice(0, 10);
                }
            } else if (activeStage === 1) {
                activeList = words.filter(w => !isWordLearned(w) && !w.stagesCompleted.includes(1)).slice(0, 10);
            } else {
                activeList = words.filter(w => !isWordLearned(w) && !w.stagesCompleted.includes(activeStage)).slice(0, 10);
            }

            if (activeList.length === 0) return renderFinish();
            if (activeStage === 1) renderStage1();
            else if (activeStage === 3) renderStage3();
            else renderGenericStage();
        }

        function renderStage1() {
            const word = activeList[activeIndex];
            if (!word) return renderFinish();
            document.getElementById('content').innerHTML = `
                <div class="w-full bg-emerald-800 rounded-[3rem] p-8 text-center shadow-xl mb-10 border-b-8 border-emerald-500 min-h-[250px] flex flex-col justify-center overflow-hidden">
                    <h2 class="text-4xl font-black text-white mb-6 italic break-words" onclick="speak('${word.en}')">${word.en}</h2>
                    <h3 onclick="this.classList.toggle('revealed')" class="text-2xl font-bold text-emerald-600 blur-text italic break-words">${word.hy}</h3>
                </div>
                <div class="grid grid-cols-2 gap-5 w-full">
                    <button onclick="handleStage1(true)" class="btn-primary">ԳԻՏԵՄ</button>
                    <button onclick="handleStage1(false)" class="btn-primary !bg-emerald-900 border border-emerald-700">ՉԳԻՏԵՄ</button>
                </div>`;
            speak(word.en);
        }

        function handleStage1(known) {
            const w = activeList[activeIndex];
            w.isSeen = true;
            if (!w.stagesCompleted.includes(1)) w.stagesCompleted.push(1);
            if(known) {
                w.isInstant = true; 
                w.learnedDate = new Date().toISOString().split('T')[0];
                setNextRep(w);
                dailyWordsCount++;
            } else { 
                w.score = 0;
            }
            saveProgress(); // SAVE
            activeIndex++; 
            if (activeIndex >= activeList.length) renderFinish();
            else renderStage1();
        }

        function renderStage3() {
            const batch = activeList.slice(0, 5);
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 gap-4 w-full items-start">
                    <div class="space-y-4" id="en-list"></div>
                    <div class="space-y-4" id="hy-list"></div>
                </div>
                <button id="next-batch-btn" onclick="initStageLogic()" class="hidden btn-primary mt-8">ՀԱՋՈՐԴԸ</button>
            `;
            const leftSide = [...batch].sort(() => Math.random() - 0.5);
            const rightSide = [...batch].sort(() => Math.random() - 0.5);
            leftSide.forEach(w => {
                const el = document.createElement('div'); el.className = 'match-item'; el.innerHTML = `<span class="break-words px-1">${w.en}</span>`;
                el.onclick = () => selectMatch(el, 'en', w); document.getElementById('en-list').appendChild(el);
            });
            rightSide.forEach(w => {
                const el = document.createElement('div'); el.className = 'match-item'; el.innerHTML = `<span class="break-words px-1">${w.hy}</span>`;
                el.onclick = () => selectMatch(el, 'hy', w); document.getElementById('hy-list').appendChild(el);
            });
        }

        function selectMatch(el, type, word) {
            if(el.classList.contains('match-correct')) return;
            document.querySelectorAll(`.match-item`).forEach(i => i.classList.remove('match-selected'));
            el.classList.add('match-selected');
            if(type === 'en') { selectedEn = { el, word }; speak(word.en); }
            else selectedHy = { el, word };
            
            if(selectedEn && selectedHy) {
                if(selectedEn.word.id === selectedHy.word.id) {
                    selectedEn.el.className = 'match-item match-correct'; 
                    selectedHy.el.className = 'match-item match-correct';
                    selectedEn.word.score = Math.min(10, selectedEn.word.score + 1);
                    if(selectedEn.word.score >= 10) { 
                        selectedEn.word.score = 0; 
                        selectedEn.word.stagesCompleted.push(3); 
                        if(isWordLearned(selectedEn.word)) {
                            selectedEn.word.learnedDate = new Date().toISOString().split('T')[0];
                            setNextRep(selectedEn.word);
                            dailyWordsCount++;
                        }
                    }
                } else {
                    selectedEn.el.classList.add('match-wrong'); 
                    selectedHy.el.classList.add('match-wrong');
                    selectedEn.word.score = Math.max(0, selectedEn.word.score - 1);
                    selectedEn.word.errorCount++; 
                    setTimeout(() => { document.querySelectorAll('.match-wrong').forEach(i => i.classList.remove('match-wrong', 'match-selected')); }, 400);
                }
                saveProgress(); // SAVE
                selectedEn = null; selectedHy = null;
                if(document.querySelectorAll('.match-correct').length === (activeList.slice(0,5).length * 2)) {
                    document.getElementById('next-batch-btn').classList.remove('hidden');
                }
            }
        }

        function renderGenericStage() {
            const word = activeList[activeIndex % activeList.length];
            if (activeStage === 2) { renderMultipleChoice(word); return; }
            let question = word.en, answer = word.hy;
            if(activeStage === 4) { question = word.hy; answer = word.en; }
            if(activeStage === 5) { question = word.en; answer = word.hy; }
            if(activeStage === 6) { question = "🔊"; answer = word.en; }
            if(activeStage === 7) { question = word.en; answer = word.hy; }
            
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center">
                    <div class="mb-2">${activeStage !== 7 ? getStars(word) : `<div class='text-emerald-400 font-bold'>ERROR COUNT: ${word.errorCount}</div>`}</div>
                    <div class="mb-10 text-4xl font-black text-white italic break-words px-4" onclick="speak('${word.en}')">${question}</div>
                    <input type="text" id="stage-input" autofocus class="w-full p-6 border-4 border-emerald-800 rounded-[2.5rem] text-center text-2xl outline-none focus:border-emerald-400 transition-all shadow-inner" placeholder="..." autocomplete="off">
                    <button id="check-btn" onclick="checkGeneric('${answer}')" class="btn-primary mt-8">ՍՏՈՒԳԵԼ</button>
                    <button id="next-btn" onclick="initStageLogic()" class="hidden btn-primary mt-8 !bg-emerald-900">ՀԱՋՈՐԴԸ</button>
                </div>`;
            
            if(activeStage !== 4) speak(word.en);
            setTimeout(() => document.getElementById('stage-input')?.focus(), 50);
        }

        function renderMultipleChoice(word) {
            let options = [word.hy];
            let otherWords = words.filter(w => w.id !== word.id).sort(() => 0.5 - Math.random());
            options.push(...otherWords.slice(0, 3).map(w => w.hy));
            options.sort(() => 0.5 - Math.random());
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center">
                    <div class="mb-2">${getStars(word)}</div>
                    <div class="mb-10 text-4xl font-black text-white italic break-words px-4" onclick="speak('${word.en}')">${word.en}</div>
                    <div class="grid grid-cols-1 gap-3 w-full">
                        ${options.map(opt => `<button onclick="checkChoice('${opt}', '${word.hy}')" class="choice-btn p-5 border-2 border-emerald-800 rounded-2xl font-bold text-lg break-words px-4">${opt}</button>`).join('')}
                    </div>
                </div>`;
            speak(word.en);
        }

        function checkChoice(selected, correct) {
            const word = activeList[activeIndex % activeList.length];
            if(cleanText(selected) === cleanText(correct)) {
                word.score = Math.min(10, word.score + 1);
                if(word.score >= 10) { 
                    word.score = 0; 
                    word.stagesCompleted.push(2); 
                    if(isWordLearned(word)) { word.learnedDate = new Date().toISOString().split('T')[0]; setNextRep(word); dailyWordsCount++; }
                }
            } else { 
                word.score = Math.max(0, word.score - 1); 
                word.errorCount++; 
            }
            saveProgress(); // SAVE
            activeIndex++; 
            initStageLogic();
        }

        function checkGeneric(correct) {
            const input = document.getElementById('stage-input');
            const word = activeList[activeIndex % activeList.length];
            if(cleanText(input.value) === cleanText(correct)) {
                if(activeStage === 4) speak(word.en);
                
                word.score = Math.min(10, word.score + 1);
                input.className = "w-full p-6 border-4 border-emerald-500 bg-emerald-600 text-white rounded-[2.5rem] text-center text-2xl outline-none";
                
                if(activeStage !== 7 && word.score >= 10) { 
                    word.score = 0; 
                    word.stagesCompleted.push(activeStage);
                    if(isWordLearned(word)) { word.learnedDate = new Date().toISOString().split('T')[0]; setNextRep(word); dailyWordsCount++; }
                } else if (activeStage === 7 && smartMode === 'repetition') {
                     setNextRep(word);
                }

                activeIndex++;
                setTimeout(initStageLogic, 600);
            } else {
                word.score = Math.max(0, word.score - 1); 
                word.errorCount++;
                input.className = "w-full p-6 border-4 border-rose-600 bg-rose-900 text-white rounded-[2.5rem] text-center text-2xl outline-none";
                input.value = correct;
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            }
            saveProgress(); // SAVE
        }

        function openStatsStage() {
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('stats-view').classList.remove('hidden');
            const container = document.getElementById('stats-container');
            const learnedWords = words.filter(w => isWordLearned(w));
            const goalProgress = Math.min(100, Math.round((dailyWordsCount / dailyGoal) * 100));

            container.innerHTML = `
                <div class="bg-emerald-800 p-6 rounded-[2.5rem] shadow-2xl border-b-8 border-emerald-500 text-center mx-auto w-full">
                    <h2 class="text-lg font-black mb-3 italic uppercase text-emerald-300">Օրական Նպատակ</h2>
                    <div class="relative w-24 h-24 mx-auto mb-3">
                        <svg class="w-full h-full" viewBox="0 0 36 36">
                            <path class="text-emerald-900" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="text-emerald-400" stroke-dasharray="${goalProgress}, 100" stroke-width="3" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span class="text-xl font-black">${dailyWordsCount}</span>
                            <span class="text-[7px] uppercase font-bold text-emerald-400">բառ</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-center gap-3 mt-4">
                        <span class="text-[10px] font-bold uppercase">Նպատակ:</span>
                        <input type="number" value="${dailyGoal}" onchange="updateDailyGoal(this.value)" class="w-16 p-1 rounded-xl text-center font-black bg-emerald-900 border border-emerald-700 text-sm">
                    </div>
                </div>

                <div class="bg-emerald-900 p-5 rounded-[2.5rem] shadow-2xl border border-emerald-700">
                    <h3 class="font-black text-emerald-300 text-[10px] mb-3 uppercase tracking-widest italic text-center">Սովորած բառերի ցանկ</h3>
                    <div class="max-h-60 overflow-y-auto space-y-2 pr-1 custom-scroll">
                        ${learnedWords.length === 0 ? '<p class="text-center text-emerald-600 italic py-6 text-sm">Դեռ սովորած բառեր չկան</p>' : 
                          learnedWords.map(w => `
                            <div class="flex justify-between items-center p-3 bg-emerald-800/50 rounded-2xl border border-emerald-700/50">
                                <div class="max-w-[70%]"><div class="font-black text-white text-sm break-words">${w.en}</div><div class="text-[9px] text-emerald-400 font-bold break-words">${w.hy}</div></div>
                                <div class="text-yellow-400 text-sm">★★★★★</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function updateDailyGoal(val) {
            dailyGoal = Math.max(1, Math.min(100, parseInt(val) || 20));
            saveProgress();
            openStatsStage();
        }

        function openExam() {
            activeList = [...words].sort(() => 0.5 - Math.random()).slice(0, 50);
            activeIndex = 0; smartMode = null;
            document.getElementById('app-content').classList.add('hidden'); document.getElementById('view').classList.remove('hidden');
            renderExamStep(0);
        }

        function renderExamStep(correctCount) {
            if(activeIndex >= activeList.length) return renderFinish(`Արդյունք: ${Math.round((correctCount/activeList.length)*100)}%`);
            const word = activeList[activeIndex];
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center">
                    <p class="text-xs font-bold text-emerald-400 mb-6 uppercase tracking-widest">${activeIndex+1} / ${activeList.length}</p>
                    <h2 class="text-4xl font-black text-white mb-10 italic break-words px-4">${word.en}</h2>
                    <input type="text" id="exam-in" autofocus class="w-full p-6 border-4 border-emerald-800 rounded-3xl text-center text-xl mb-8 outline-none" placeholder="..." autocomplete="off">
                    <button id="ex-btn" class="btn-primary">ՀԱՋՈՐԴԸ</button>
                </div>`;
            setTimeout(() => document.getElementById('exam-in').focus(), 50);
            document.getElementById('ex-btn').onclick = () => { 
                if(cleanText(document.getElementById('exam-in').value) === cleanText(word.hy)) correctCount++; 
                else word.errorCount++;
                activeIndex++; 
                renderExamStep(correctCount); 
            };
        }

        function renderFinish(extra = "") {
            document.getElementById('content').innerHTML = `
                <div class="text-center p-12 bg-emerald-800 rounded-[3.5rem] shadow-2xl w-full border-b-8 border-emerald-500">
                    <div class="text-7xl mb-6">🏆</div>
                    <h2 class="text-3xl font-black mb-4 text-white italic">Գերազանց է</h2>
                    <p class="text-emerald-200 mb-8 font-bold">${extra || "Բաժինը հաջողությամբ անցաք:"}</p>
                    <button onclick="exitToMenu()" class="btn-primary">ՎԵՐԱԴԱՌՆԱԼ</button>
                </div>`;
            saveProgress(); // SAVE
        }

        function exitToMenu() {
            document.querySelectorAll('#view, #stats-view, #smart-menu-view').forEach(el => el.classList.add('hidden'));
            document.getElementById('app-content').classList.remove('hidden');
            window.speechSynthesis.cancel(); updateStats();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text); msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function showDeleteModal() { document.getElementById('delete-modal').classList.remove('hidden'); }
        function hideDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); }
        function confirmFinalDelete() { localStorage.removeItem('usanim_v3_data'); location.reload(); }

        initApp();
    </script>
</body>
</html>
