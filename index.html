<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usanim - English A1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; user-select: none; touch-action: manipulation; }
        .stage-card { transition: all 0.2s ease; border: 2px solid transparent; cursor: pointer; height: 100%; }
        .stage-card:active { transform: scale(0.95); }
        .match-box { border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; min-height: 60px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
        .match-selected { border-color: #3b82f6; background-color: #eff6ff; }
        .match-correct { border-color: #22c55e; background-color: #f0fdf4; pointer-events: none; opacity: 0.6; }
        .match-wrong { border-color: #ef4444; background-color: #fef2f2; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        /* Աստղերի ոճավորում */
        .star-container { display: flex; gap: 2px; justify-content: center; margin-bottom: 10px; }
        .star { position: relative; display: inline-block; width: 24px; height: 24px; color: #e2e8f0; font-size: 24px; line-height: 24px; }
        .star.full { color: #fbbf24; }
        .star.half::after { content: '★'; position: absolute; left: 0; top: 0; width: 50%; overflow: hidden; color: #fbbf24; }
        .star::before { content: '★'; }
    </style>
</head>
<body class="w-full bg-white min-h-screen relative">

    <div class="bg-indigo-600 p-4 text-white sticky top-0 z-50 shadow-md w-full">
        <div class="max-w-4xl mx-auto flex justify-between items-center mb-2">
            <div onclick="exitToMenu()" class="cursor-pointer">
                <h1 class="font-bold text-xl">Usanim A1</h1>
                <p id="progress-text" class="text-xs opacity-80">Բեռնվում է...</p>
            </div>
            <button onclick="resetData()" class="text-xs bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-lg transition">Reset</button>
        </div>
        <div class="max-w-4xl mx-auto w-full bg-indigo-900 rounded-full h-2">
            <div id="progress-bar" class="bg-emerald-400 h-2 rounded-full" style="width: 0%"></div>
        </div>
    </div>

    <div id="menu" class="max-w-4xl mx-auto p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
        <button onclick="openStage(1)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🗂️</span>
            <span class="font-bold text-sm">Փուլ 1</span>
            <p class="text-[10px] text-gray-400 uppercase">Flashcards</p>
        </button>
        <button onclick="openStage(2)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🔘</span>
            <span class="font-bold text-sm">Փուլ 2</span>
            <p class="text-[10px] text-gray-400 uppercase">Ընտրություն</p>
        </button>
        <button onclick="openStage(3)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🧩</span>
            <span class="font-bold text-sm">Փուլ 3</span>
            <p class="text-[10px] text-gray-400 uppercase">Match 5-5</p>
        </button>
        <button onclick="openStage(4)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">⌨️</span>
            <span class="font-bold text-sm">Փուլ 4</span>
            <p class="text-[10px] text-gray-400 uppercase">Ուղղագրություն</p>
        </button>
        <button onclick="openStage(5)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🔄</span>
            <span class="font-bold text-sm">Փուլ 5</span>
            <p class="text-[10px] text-gray-400 uppercase">Թարգմանություն</p>
        </button>
        <button onclick="openStage(6)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center border">
            <span class="text-3xl mb-2">🎧</span>
            <span class="font-bold text-sm">Փուլ 6</span>
            <p class="text-[10px] text-gray-400 uppercase">Լսողություն</p>
        </button>
        
        <button onclick="openStage(7)" class="stage-card p-4 bg-indigo-50 border-indigo-200 rounded-2xl shadow-sm flex flex-col items-center">
            <span class="text-3xl mb-1">🎓</span>
            <span class="font-bold text-indigo-700 text-sm">Փուլ 7: Քննություն</span>
        </button>
        <button onclick="openStage(8)" class="stage-card p-4 bg-emerald-50 border-emerald-200 rounded-2xl shadow-sm flex flex-col items-center">
            <span class="text-3xl mb-1">📊</span>
            <span class="font-bold text-emerald-700 text-sm">Փուլ 8: Արդյունքներ</span>
        </button>
    </div>

    <div id="view" class="hidden p-4 min-h-[80vh] max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <button onclick="exitToMenu()" class="text-indigo-600 font-bold flex items-center bg-indigo-50 px-4 py-2 rounded-xl">
                <span class="mr-1">🏠</span> Մենյու
            </button>
            <div id="view-title" class="text-xs font-bold text-gray-400 uppercase tracking-widest"></div>
        </div>
        <div id="content" class="flex flex-col items-center w-full"></div>
    </div>

    <script>
        let words = [];
        let activeStage = 1;
        let activeIndex = 0;
        let activeList = [];
        let matchSelected = null;
        let examScore = 0;
        let canProceed = false;

        async function initApp() {
            try {
                const response = await fetch('./vocabulary.json');
                const data = await response.json();
                words = data.map((item, index) => ({
                    id: item.id || index,
                    en: item.word,
                    hy: item.translation,
                    tr: item.transcription || "",
                    score: 0
                }));
                loadProgress();
                updateOverallProgress();
            } catch (e) { console.error(e); }
        }

        function loadProgress() {
            const saved = localStorage.getItem('usanim_data');
            if(saved) {
                const parsed = JSON.parse(saved);
                words.forEach(w => { if(parsed[w.id] !== undefined) w.score = parsed[w.id]; });
            }
        }

        function saveProgress() {
            const progress = {};
            words.forEach(w => progress[w.id] = w.score);
            localStorage.setItem('usanim_data', JSON.stringify(progress));
            updateOverallProgress();
        }

        function updateOverallProgress() {
            const learned = words.filter(w => w.score >= 10).length;
            const percent = words.length > 0 ? (learned / words.length) * 100 : 0;
            document.getElementById('progress-text').innerText = `Յուրացված: ${learned} / ${words.length}`;
            document.getElementById('progress-bar').style.width = percent + "%";
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function getStars(score) {
            let html = '<div class="star-container">';
            for (let i = 1; i <= 5; i++) {
                if (score >= i * 2) {
                    html += '<span class="star full"></span>';
                } else if (score >= (i * 2) - 1) {
                    html += '<span class="star half"></span>';
                } else {
                    html += '<span class="star"></span>';
                }
            }
            html += '</div>';
            return html;
        }

        function openStage(num) {
            activeStage = num;
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = num === 8 ? "ԱՐԴՅՈՒՆՔՆԵՐ" : `ՓՈՒԼ ${num}`;
            initStageLogic();
        }

        function exitToMenu() {
            document.getElementById('view').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            window.speechSynthesis.cancel();
        }

        function initStageLogic() {
            activeIndex = 0;
            const container = document.getElementById('content');
            container.innerHTML = "";

            if(activeStage === 1) {
                activeList = words.filter(w => w.score < 10);
                renderStage1();
            } else if (activeStage >= 2 && activeStage <= 6) {
                activeList = words.filter(w => w.score < 10).slice(0, 10);
                renderLearningStages();
            } else if (activeStage === 7) {
                examScore = 0;
                activeList = [...words].sort(() => 0.5 - Math.random()).slice(0, 100);
                renderExam();
            } else if (activeStage === 8) {
                renderStage8();
            }
        }

        function renderStage1() {
            const container = document.getElementById('content');
            if(activeIndex >= activeList.length) { exitToMenu(); return; }
            const word = activeList[activeIndex];
            container.innerHTML = `
                <div class="w-full max-w-2xl bg-white border-2 border-indigo-100 rounded-3xl p-10 text-center shadow-lg mb-6" onclick="speak('${word.en}')">
                    <h2 class="text-6xl font-black text-indigo-600 mb-4">${word.en}</h2>
                    <p class="text-blue-400 text-xl mb-6">${word.tr}</p>
                    <hr class="mb-6">
                    <h3 class="text-4xl font-bold text-slate-800">${word.hy}</h3>
                </div>
                <div class="grid grid-cols-2 gap-4 w-full max-w-2xl">
                    <button onclick="flashcardAction(true)" class="bg-emerald-500 text-white font-bold py-6 rounded-2xl text-xl shadow-lg">ԳԻՏԵՄ</button>
                    <button onclick="flashcardAction(false)" class="bg-rose-500 text-white font-bold py-6 rounded-2xl text-xl shadow-lg">ՉԳԻՏԵՄ</button>
                </div>
            `;
            speak(word.en);
        }

        function flashcardAction(known) {
            if(known) { activeList[activeIndex].score = 10; saveProgress(); }
            activeIndex++; renderStage1();
        }

        function renderLearningStages() {
            const container = document.getElementById('content');
            if (activeStage === 3) { renderMatch5(); return; }
            if (activeList.length === 0) { exitToMenu(); return; }

            const word = activeList[activeIndex % activeList.length];
            canProceed = false;
            container.innerHTML = `<div id="task-area" class="w-full flex flex-col items-center max-w-2xl"></div>`;
            const area = document.getElementById('task-area');

            if(activeStage === 2) {
                const opts = [word.hy, ...words.filter(w => w.id !== word.id).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.hy)].sort(() => 0.5 - Math.random());
                area.innerHTML = `
                    ${getStars(word.score)}
                    <div class="text-center mb-8" onclick="speak('${word.en}')">
                        <p class="text-6xl font-black text-indigo-600">${word.en}</p>
                        <p class="text-gray-400 text-xl">${word.tr}</p>
                    </div>
                    <div id="options-grid" class="grid grid-cols-1 gap-4 w-full">
                        ${opts.map(o => `<button onclick="checkChoice(this, '${o}', '${word.hy}')" class="bg-white border-4 p-5 rounded-2xl font-bold text-xl shadow-sm transition-all">${o}</button>`).join('')}
                    </div>
                    <button id="next-btn" onclick="nextWord()" class="hidden mt-8 w-full bg-slate-800 text-white p-5 rounded-2xl font-bold text-xl">ՀԱՋՈՐԴԸ ➔</button>
                `;
                speak(word.en);
            } else {
                const isListen = activeStage === 6;
                const isTrans = activeStage === 5;
                const correctVal = isTrans ? word.hy : word.en;

                area.innerHTML = `
                    ${getStars(word.score)}
                    <div class="text-center mb-6">
                        ${isListen ? `<button onclick="speak('${word.en}')" class="text-8xl p-8 bg-indigo-50 rounded-full">🔊</button>` : `<p class="text-5xl font-bold text-slate-700">${isTrans ? word.en : word.hy}</p>`}
                    </div>
                    <input type="text" id="userInput" class="w-full p-6 border-4 rounded-2xl text-center text-3xl mb-4 outline-none border-gray-200" placeholder="..." autocomplete="off">
                    <div id="feedback" class="hidden text-xl font-bold mb-4"></div>
                    <button id="check-btn" onclick="checkWriting('${correctVal}')" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold text-xl mb-4">ՍՏՈՒԳԵԼ</button>
                    <button id="next-btn" onclick="nextWord()" class="hidden w-full bg-slate-800 text-white p-5 rounded-2xl font-bold text-xl">ՀԱՋՈՐԴԸ ➔</button>
                `;
                if(!isListen) speak(word.en);
                document.getElementById('userInput').focus();
            }
        }

        function checkChoice(btn, chosen, correct) {
            if(canProceed) return;
            const word = activeList[activeIndex % activeList.length];
            const allBtns = document.querySelectorAll('#options-grid button');
            
            if(chosen === correct) {
                btn.classList.replace('bg-white', 'bg-emerald-500');
                btn.classList.add('text-white', 'border-emerald-600');
                word.score = Math.min(10, word.score + 1);
            } else {
                btn.classList.replace('bg-white', 'bg-rose-500');
                btn.classList.add('text-white', 'border-rose-600');
                allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('border-emerald-500', 'bg-emerald-50'); });
                word.score = Math.max(0, word.score - 1);
            }
            saveProgress();
            canProceed = true;
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function checkWriting(correct) {
            if(canProceed) return;
            const input = document.getElementById('userInput');
            const feedback = document.getElementById('feedback');
            const word = activeList[activeIndex % activeList.length];
            
            if(input.value.trim().toLowerCase() === correct.toLowerCase()) {
                input.classList.add('bg-emerald-500', 'text-white', 'border-emerald-600');
                word.score = Math.min(10, word.score + 1);
            } else {
                input.classList.add('bg-rose-500', 'text-white', 'border-rose-600');
                feedback.innerHTML = `<span class="text-rose-600">Ճիշտը՝</span> <span class="text-emerald-600 underline">${correct}</span>`;
                feedback.classList.remove('hidden');
                word.score = Math.max(0, word.score - 1);
            }
            saveProgress();
            canProceed = true;
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function renderMatch5() {
            const container = document.getElementById('content');
            const batch = activeList.slice(0, 5);
            if(batch.length === 0) { exitToMenu(); return; }
            const enL = [...batch].sort(() => 0.5 - Math.random());
            const hyL = [...batch].sort(() => 0.5 - Math.random());
            
            // Աստղերի ընդհանուր միջինը այս խմբի համար
            const avgScore = batch.reduce((a, b) => a + b.score, 0) / 5;

            container.innerHTML = `
                ${getStars(avgScore)}
                <div class="grid grid-cols-2 gap-4 w-full max-w-2xl mt-4">
                    <div class="flex flex-col gap-3">${enL.map(w => `<div class="match-box bg-white shadow-sm" data-type="en" data-id="${w.id}" onclick="handleM(this)">${w.en}</div>`).join('')}</div>
                    <div class="flex flex-col gap-3">${hyL.map(w => `<div class="match-box bg-white shadow-sm" data-type="hy" data-id="${w.id}" onclick="handleM(this)">${w.hy}</div>`).join('')}</div>
                </div>
                <button id="next-btn" onclick="nextWord()" class="hidden mt-8 w-full max-w-2xl bg-slate-800 text-white p-5 rounded-2xl font-bold text-xl">ՀԱՋՈՐԴԸ ➔</button>
            `;
        }

        function handleM(el) {
            if(el.classList.contains('match-correct') || el === matchSelected || canProceed) return;
            if(!matchSelected) { matchSelected = el; el.classList.add('match-selected'); }
            else {
                if(matchSelected.dataset.id === el.dataset.id && matchSelected.dataset.type !== el.dataset.type) {
                    el.classList.add('match-correct'); matchSelected.classList.add('match-correct');
                    speak(words.find(w => w.id == el.dataset.id).en);
                    matchSelected = null;
                    if(document.querySelectorAll('.match-correct').length === (activeList.slice(0, 5).length * 2)) {
                        activeList.slice(0, 5).forEach(w => w.score = Math.min(10, w.score + 1)); 
                        saveProgress();
                        canProceed = true;
                        document.getElementById('next-btn').classList.remove('hidden');
                    }
                } else {
                    el.classList.add('match-wrong'); matchSelected.classList.add('match-wrong');
                    const prev = matchSelected;
                    setTimeout(() => { el.classList.remove('match-wrong', 'match-selected'); prev.classList.remove('match-wrong', 'match-selected'); }, 500);
                    matchSelected = null;
                }
            }
        }

        function nextWord() {
            const word = activeList[activeIndex % activeList.length];
            if(activeStage !== 3) {
                if(word.score >= 10) activeList = activeList.filter(w => w.id !== word.id);
                else activeIndex++;
            } else {
                activeList = words.filter(w => w.score < 10).slice(0, 10);
                activeIndex = 0;
            }
            renderLearningStages();
        }

        function renderExam() {
            const container = document.getElementById('content');
            if(activeIndex >= activeList.length) {
                container.innerHTML = `<div class='text-center p-10 bg-indigo-50 rounded-3xl'><h2 class='text-3xl font-black mb-4'>ԱՐԴՅՈՒՆՔ</h2><p class='text-8xl font-black text-indigo-600 mb-6'>${examScore}/100</p><button onclick='exitToMenu()' class='bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold text-xl'>ՎԵՐԱԴԱՌՆԱԼ</button></div>`;
                return;
            }
            const word = activeList[activeIndex];
            const opts = [word.hy, ...words.filter(w => w.id !== word.id).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.hy)].sort(() => 0.5 - Math.random());
            container.innerHTML = `<div class="mb-4 font-bold text-gray-400">ՀԱՐՑ ${activeIndex+1}/100</div>
            <div class="text-center mb-8"><p class="text-6xl font-black text-indigo-600">${word.en}</p></div>
            <div class="grid grid-cols-1 gap-4 w-full max-w-2xl">${opts.map(o => `<button onclick="handleExamAns(this, '${o}', '${word.hy}')" class="bg-white border-2 p-5 rounded-2xl font-bold text-xl shadow-sm">${o}</button>`).join('')}</div>`;
            speak(word.en);
        }

        function handleExamAns(btn, chosen, correct) {
            if(chosen === correct) { examScore++; btn.classList.add('bg-emerald-500', 'text-white'); }
            else { btn.classList.add('bg-rose-500', 'text-white'); }
            setTimeout(() => { activeIndex++; renderExam(); }, 400);
        }

        function renderStage8() {
            const container = document.getElementById('content');
            container.innerHTML = `<div class="w-full space-y-2 pb-10 max-w-4xl">` + words.map((w, i) => `
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl border ${w.score >= 10 ? 'border-emerald-200 bg-emerald-50' : 'border-gray-100'}">
                    <div onclick="speak('${w.en}')" class="cursor-pointer">
                        <p class="font-bold text-indigo-700 text-lg">${i+1}. ${w.en}</p>
                        <p class="text-sm text-gray-500">${w.hy}</p>
                    </div>
                    <div class="flex flex-col items-end">
                        ${getStars(w.score)}
                        <span class="text-[10px] font-bold text-gray-400 uppercase">SCORE: ${w.score}/10</span>
                    </div>
                </div>
            `).join('') + `</div>`;
        }

        function resetData() {
            if(confirm("Ջնջե՞լ ամբողջ առաջընթացը:")) { localStorage.removeItem('usanim_data'); location.reload(); }
        }

        initApp();
    </script>
</body>
</html>
